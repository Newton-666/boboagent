<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><title>Bobo</title>
<style>
:root { --bg: #faf9f2; --bg2: #f2f1e8; --bg3: #eae8dc; --text: #2d2d2d; --text2: #777; --border: #e0ded4; --hover: #e8e6da; --green: #4caf50; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; font-size:15px; line-height:1.6; overflow:hidden; height:100vh; }
#app { display:flex; height:100vh; }
/* Sidebar */
#sidebar { width:240px; min-width:240px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; }
#sidebar-header { padding:12px; }
#new-chat { width:100%; padding:10px; background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:14px; }
#new-chat:hover { background:var(--hover); }
#session-list { flex:1; overflow-y:auto; padding:4px 8px; }
.session-item { padding:10px 12px; border-radius:8px; cursor:pointer; color:var(--text2); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:space-between; }
.session-item:hover { background:var(--hover); }
.session-item.active { background:var(--bg3); color:var(--text); }
.session-item .del { visibility:hidden; cursor:pointer; color:#f44336; font-size:14px; margin-left:6px; flex-shrink:0; }
.session-item:hover .del { visibility:visible; }
#sidebar-footer { padding:12px; font-size:12px; color:var(--text2); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
#sidebar-footer .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
#sidebar-footer .dot.green { background:var(--green); }
#sidebar-footer .dot.red { background:#f44336; }
/* Main */
#main { flex:1; display:flex; flex-direction:column; max-width:800px; margin:0 auto; width:100%; }
#welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
#welcome h1 { font-size:32px; font-weight:600; }
#welcome p { color:var(--text2); }
#chat { flex:1; overflow-y:auto; padding:24px 16px; }
.msg { padding:10px 18px; border-radius:12px; margin-bottom:20px; max-width:85%; animation:fadeIn 0.25s ease; }
.msg.user { background:var(--bg2); border:1px solid var(--border); margin-left:auto; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg .who { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px; }
.msg .txt { white-space:pre-wrap; word-break:break-word; }
.msg .txt strong, .msg .txt b { color:#e8913a; }
.tool { font-size:13px; color:var(--text2); padding:6px 12px; margin:4px 0; cursor:pointer; border-radius:6px; display:flex; align-items:center; gap:8px; border:1px solid transparent; }
.tool:hover { background:rgba(0,0,0,0.02); border-color:var(--border); }
.tool .dot { color:var(--text-muted); font-size:10px; flex-shrink:0; animation:dotPulse 3s infinite; }
.tool .dot.done { animation:none; color:#50a14f; }
.tool .dot.fail { animation:none; color:#f48771; }
.tool .tool-name { flex-shrink:0; }
.tool .tool-context { color:var(--text-muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tool .tool-status { font-size:10px; color:var(--text-muted); margin-left:auto; flex-shrink:0; }
.tool .tool-toggle { color:var(--text-muted); font-size:10px; flex-shrink:0; }
.tool-result { font-size:11px; color:var(--text2); margin:2px 0 0 24px; padding:4px 10px; background:rgba(0,0,0,0.02); border-radius:4px; font-family:monospace; white-space:pre-wrap; word-break:break-all; max-height:0; overflow-y:auto; display:block; opacity:0; transition:max-height 0.25s ease, opacity 0.2s ease, padding 0.2s ease; }
.tool-result.open { max-height:120px; opacity:1; padding:4px 10px; }
.tool-result.error { color:#f48771; background:rgba(244,135,113,0.06); display:block; }
@keyframes dotPulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
/* Thinking */
.think-box { padding:10px 14px; margin:8px 0; border-radius:8px; font-size:13px; color:var(--text2); display:none; background:rgba(91,155,213,0.04); border:1px solid rgba(91,155,213,0.12); animation:fadeIn 0.3s ease; }
.think-box.show { display:block; }
.think-box .think-label { font-size:11px; color:#5b9bd5; margin-bottom:4px; font-weight:600; display:flex; align-items:center; gap:8px; }
.think-stop { margin-left:auto; cursor:pointer; font-size:12px; color:var(--text-muted); padding:2px 6px; border-radius:4px; font-weight:400; }
.think-stop:hover { background:rgba(244,135,113,0.1); color:#f48771; }
.think-dot { width:5px; height:5px; border-radius:50%; background:#5b9bd5; animation:thinkPulse 1.4s infinite; display:inline-block; }
.think-dot:nth-child(2) { animation-delay:0.2s; }
.think-dot:nth-child(3) { animation-delay:0.4s; }
.think-box .think-text { white-space:pre-wrap; word-break:break-word; line-height:1.5; }
@keyframes thinkPulse { 0%,60%,100% { opacity:0.2; transform:scale(1); } 30% { opacity:1; transform:scale(1.3); } }
.status { font-size:12px; color:var(--text2); text-align:center; padding:4px; }
/* Code blocks */
.code-block-wrapper { margin:8px 0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.code-header { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); padding:6px 12px; border-bottom:1px solid var(--border); }
.code-lang { font-size:11px; color:var(--text2); text-transform:uppercase; }
.copy-btn { background:none; border:1px solid var(--border); border-radius:4px; color:var(--text2); cursor:pointer; font-size:11px; padding:2px 8px; font-family:inherit; }
.copy-btn:hover { background:var(--bg3); }
.copy-btn.copied { color:#50a14f; border-color:#50a14f; }
.msg .txt pre { background:#f3f2ea; border:none; padding:12px 16px; margin:0; overflow-x:auto; font-family:'SF Mono',Monaco,Menlo,monospace; font-size:13px; line-height:1.5; color:#333; }
.msg .txt code { font-family:'SF Mono',Monaco,Menlo,monospace; font-size:13px; background:rgba(0,0,0,0.05); padding:1px 4px; border-radius:3px; }
.msg .txt pre code { background:none; padding:0; font-size:13px; }
/* Diff */
.msg .txt .diff-add { color:#7ec87b; }
.msg .txt .diff-del { color:#f48771; }
.msg .txt .diff-file { color:#5b9bd5; font-weight:600; }
/* Tables */
.msg .txt table { border-collapse:collapse; margin:8px 0; font-size:13px; width:100%; }
.msg .txt th, .msg .txt td { border:1px solid var(--border); padding:6px 12px; text-align:left; }
.msg .txt th { background:var(--bg3); color:#5b9bd5; font-weight:600; }
.msg .txt tr:nth-child(even) { background:rgba(255,255,255,0.03); }
#input-box { padding:12px 16px 24px; position:relative; }
#input { width:100%; padding:14px 48px 14px 18px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font:inherit; resize:none; outline:none; }
#input:focus { border-color:#e8913a; box-shadow:0 0 0 2px rgba(232,145,58,0.12); }
#input::placeholder { color:var(--text2); }
#send { position:absolute; right:24px; bottom:32px; width:32px; height:32px; border-radius:8px; background:var(--text); color:var(--bg); border:none; cursor:pointer; font-size:16px; font-weight:600; }
#send:disabled { opacity:0.3; }
#debug { text-align:center; font-size:11px; color:#666; margin-top:8px; font-family:monospace; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }
/* Settings modal */
#settings-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
#settings-modal.open { display:flex; }
#settings-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:24px; width:420px; max-height:80vh; overflow-y:auto; }
#settings-panel h2 { font-size:18px; margin-bottom:16px; }
#settings-panel label { display:block; font-size:12px; color:var(--text2); margin:12px 0 4px; }
#settings-panel input, #settings-panel select { width:100%; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font:inherit; margin-bottom:8px; }
#settings-panel button { padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font:inherit; margin-right:8px; }
#settings-panel .btn-save { background:#5b9bd5; color:#fff; }
#settings-panel .btn-close { background:var(--bg3); color:var(--text); }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header"><button id="new-chat">+ 新对话</button></div>
    <div id="session-list"></div>
    <div id="sidebar-footer"><span id="status-dot" class="dot red"></span><span id="status-text">Offline</span><button id="settings-icon" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:16px;color:inherit;" title="Settings" onclick="openSettings()">⚙</button></div>
  </div>
  <div id="main">
    <div id="welcome"><h1>Bobo</h1><p>你的个人 AI 助手</p></div>
    <div id="debug" style="text-align:center;font-size:11px;color:#666;font-family:monospace;padding:4px;">Starting...</div>
    <div id="chat"></div>
    <div id="input-box">
      <textarea id="input" rows="1" placeholder="Connecting..." disabled></textarea>
      <button id="send" disabled>↑</button>
    </div>
  </div>
</div>
<script>
// ── Gateway ────────────────────────────────────────────────────────────
const handlers = new Map(); let reqId = 0; const pending = new Map();
let currentSessionId = null; let connected = false;
function connect() {
  if (!window.boboAPI) { debug('Browser mode'); return; }
  debug('Connecting...');
  window.boboAPI.onMessage(function(msg) {
    if (!msg || typeof msg !== 'object') return;
    if (msg.method === 'event' && msg.params && msg.params.type) {
      var h = handlers.get(msg.params.type);
      if (h) h(msg.params.payload || msg.params);
      return;
    }
    if (msg.id) { var r = pending.get(msg.id); if (r) { pending.delete(msg.id); r(msg.result || msg.error || {}); } }
  });
}
function on(e, h) { handlers.set(e, h); }
function call(m, p) {
  if (!window.boboAPI) return Promise.resolve({});
  return new Promise(function(resolve) {
    var id = 'req-' + (++reqId); pending.set(id, resolve);
    window.boboAPI.send({ jsonrpc:'2.0', id:id, method:m, params:p||{} });
    setTimeout(function() { pending.delete(id); resolve({}); }, 120000);
  });
}
function sendPrompt(text) {
  if (!currentSessionId || !window.boboAPI) { debug('Cannot send: no session or API'); return; }
  debug('Sent ✓ (sid=' + currentSessionId.substring(0,12) + ')');
  window.boboAPI.send({ jsonrpc:'2.0', id:'prompt-'+(++reqId), method:'prompt.submit', params:{ session_id:currentSessionId, text:text } });
}

// ── UI refs ────────────────────────────────────────────────────────────
var chatEl = document.getElementById('chat');
var welcomeEl = document.getElementById('welcome');
var inputEl = document.getElementById('input');
var sendEl = document.getElementById('send');
var debugEl = document.getElementById('debug');
var sessionListEl = document.getElementById('session-list');
var statusDot = document.getElementById('status-dot');
var statusText = document.getElementById('status-text');
var messaging = false;
var sessions = [];

function debug(msg) { debugEl.textContent = '[' + msg + ']'; }
function setConnected(c) {
  connected = c; inputEl.disabled = !c; sendEl.disabled = !c;
  inputEl.placeholder = c ? '输入消息 (⌘↵ 发送，↵ 换行)' : 'Connecting...';
  statusDot.className = 'dot ' + (c ? 'green' : 'red');
  statusText.textContent = c ? 'Connected' : 'Offline';
}
var _codeStore = {};
var _codeId = 0;
function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyCode(id) {
  var code = _codeStore[id];
  if (!code) return;
  navigator.clipboard.writeText(code).then(function() {
    var btn = document.getElementById('copy-' + id);
    if (btn) { btn.textContent = '✓ 已复制'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000); }
  });
}
function highlight(code, lang) {
  var kw = '\\b(def|class|import|from|return|if|else|elif|for|while|try|except|finally|with|as|in|not|and|or|True|False|None|pass|break|continue|yield|async|await|function|const|let|var|export|default|new|this|throw|catch|go|func|defer|struct|interface|map|chan|fn|let|mut|pub|impl|trait|enum|mod|use)\\b';
  var escaped = esc(code);
  // Strings
  escaped = escaped.replace(/(&quot;.*?&quot;|&#39;.*?&#39;|".*?"|'.*?')/g, '<span style="color:#50a14f">$1</span>');
  escaped = escaped.replace(/(''[^']*''|"""[^"]*""")/g, '<span style="color:#50a14f">$1</span>');
  // Comments
  escaped = escaped.replace(/(#.*$)/gm, '<span style="color:#a0a0a0;font-style:italic">$1</span>');
  escaped = escaped.replace(/(\/\/.*$)/gm, '<span style="color:#a0a0a0;font-style:italic">$1</span>');
  // Numbers
  escaped = escaped.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#c18401">$1</span>');
  // Keywords
  escaped = escaped.replace(new RegExp(kw, 'g'), '<span style="color:#a626a4;font-weight:600">$1</span>');
  // Decorators
  escaped = escaped.replace(/(@\w+)/g, '<span style="color:#c18401">$1</span>');
  return escaped;
}
function md(s) {
  var codeBlocks = [];
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var rawCode = code.trim();
    var cid = 'c' + (++_codeId);
    _codeStore[cid] = rawCode;
    codeBlocks.push(
      '<div class="code-block-wrapper">' +
      '<div class="code-header">' +
      '<span class="code-lang">' + esc(lang || '') + '</span>' +
      '<button id="copy-' + cid + '" class="copy-btn" onclick="copyCode(\'' + cid + '\')">复制</button>' +
      '</div>' +
      '<pre><code>' + highlight(rawCode, lang) + '</code></pre>' +
      '</div>'
    );
    return '%%CODEBLOCK' + (codeBlocks.length-1) + '%%';
  });
  var tables = [];
  s = s.replace(/((?:\|.+(?:\r?\n|$))+)/gm, function(block) {
    var lines = block.trim().split(/\r?\n/);
    if (lines.length < 2) return block;
    var sepLine = lines[1].replace(/\s/g, '');
    if (!/^\|[-:]+\|$/.test(sepLine)) return block;
    var h = '<table><thead><tr>' + lines[0].split('|').filter(function(c){return c.trim();}).map(function(c){return '<th>'+esc(c.trim())+'</th>';}).join('') + '</tr></thead><tbody>';
    for (var i=2; i<lines.length; i++) {
      h += '<tr>' + lines[i].split('|').filter(function(c){return c.trim();}).map(function(c){return '<td>'+esc(c.trim())+'</td>';}).join('') + '</tr>';
    }
    h += '</tbody></table>';
    tables.push(h);
    return '%%TABLE' + (tables.length-1) + '%%';
  });
  s = esc(s);
  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3 style="font-size:16px;margin:12px 0 4px;">$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2 style="font-size:18px;margin:16px 0 4px;">$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1 style="font-size:20px;margin:20px 0 4px;">$1</h1>');
  // Lists
  s = s.replace(/^\- (.+)$/gm, '<li style="margin-left:16px;">$1</li>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li style="margin-left:16px;">$1</li>');
  // Quotes
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:2px solid #5b9bd5;padding-left:12px;color:var(--text2);margin:4px 0;">$1</blockquote>');
  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#5b9bd5;">$1</a>');
  // Inline code, bold
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Diff lines
  var lines = s.split('\n');
  for (var i = 0; i < lines.length; i++) {
    if (/^\+/.test(lines[i]) && !/^\+[-\s]/.test(lines[i])) lines[i] = '<span class="diff-add">' + lines[i] + '</span>';
    else if (/^\-/.test(lines[i]) && !/^\-[-\s]/.test(lines[i])) lines[i] = '<span class="diff-del">' + lines[i] + '</span>';
    else if (/^@@/.test(lines[i])) lines[i] = '<span class="diff-file">' + lines[i] + '</span>';
  }
  s = lines.join('\n');
  s = s.replace(/%%CODEBLOCK(\d+)%%/g, function(_, i) { return codeBlocks[+i]; });
  s = s.replace(/%%TABLE(\d+)%%/g, function(_, i) { return tables[+i]; });
  return s;
}

// ── Messages ───────────────────────────────────────────────────────────
function clearChat() { chatEl.innerHTML = ''; welcomeEl.style.display = 'flex'; }

function addMsg(role, text, id, append) {
  welcomeEl.style.display = 'none';
  var existing = document.getElementById(id);
  if (existing) { existing.querySelector('.txt').innerHTML = append ? existing.querySelector('.txt').innerHTML + md(text) : md(text); return; }
  var div = document.createElement('div'); div.id = id; div.className = 'msg ' + role;
  div.innerHTML = '<div class="who">' + (role==='user'?'You':'Bobo') + '</div><div class="txt">' + md(text) + '</div>';
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}
var toolResults = {};
var toolArgs = {};  // store tool.start arguments for diff display

function addTool(name, context, toolId) {
  welcomeEl.style.display = 'none';
  freezeThinkBox();

  // Friendly names
  var friendly = name;
  var friendlyMap = {
    'file_operation': '写入文件', 'write_obsidian': '写入笔记', 'append_obsidian': '追加笔记',
    'read_local_file': '读取文件', 'read_obsidian': '读取笔记',
    'grep_code': '搜索代码', 'search_code': '搜索代码', 'search_obsidian': '搜索笔记',
    'code_execution': '执行代码', 'execute_terminal': '终端命令',
    'edit_file': '编辑文件', 'run_tests': '运行测试',
    'web_search': '网络搜索', 'web_fetch': '抓取网页', 'web_extract': '提取内容',
    'git_status': 'Git 状态', 'github_create_pr': '创建 PR', 'github_pr_diff': 'PR 差异',
    'index_project': '项目索引', 'review_diff': '审查代码',
    'cross_search': '跨平台搜索', 'cross_project_search': '跨项目搜索',
    'code_to_obsidian': '保存知识', 'review_to_obsidian': '保存审查',
    'save_memory': '保存记忆', 'search_memory': '搜索记忆',
    'get_current_time': '获取时间', 'list_directory': '列出目录',
    'notion_search': '搜索 Notion', 'notion_create_page': '创建 Notion 页面',
    'search_emails': '搜索邮件', 'send_notification': '发送通知',
  };
  if (friendlyMap[name]) friendly = friendlyMap[name];

  var div = document.createElement('div'); div.className = 'tool';
  div.id = 'tool-' + toolId;
  div.innerHTML = '<span class="dot">●</span>' +
    '<span class="tool-name">' + esc(friendly) + '</span>' +
    (context && context !== name ? '<span class="tool-context">' + esc(context) + '</span>' : '') +
    '<span class="tool-status">running</span>' +
    '<span class="tool-toggle" style="display:none">▸</span>' +
    '<div class="tool-result"></div>';
  div.onclick = function() {
    var r = div.querySelector('.tool-result');
    if (!r) return;
    var opening = !r.classList.contains('open');
    r.classList.toggle('open');
    var t = div.querySelector('.tool-toggle');
    t.textContent = r.classList.contains('open') ? '▾' : '▸';
    t.style.display = 'inline';
    // Load full result from data attribute when expanding
    if (opening && div.getAttribute('data-result')) {
      r.textContent = div.getAttribute('data-result');
      r.style.maxHeight = '300px';
    }
  };
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}

function updateToolResult(toolId, resultText, error) {
  var div = document.getElementById('tool-' + toolId);
  if (!div) return;
  var dot = div.querySelector('.dot');
  var statusEl = div.querySelector('.tool-status');
  var toggleEl = div.querySelector('.tool-toggle');
  var resultEl = div.querySelector('.tool-result');
  var args = toolArgs[toolId] || {};
  var name = div.querySelector('.tool-name') ? div.querySelector('.tool-name').textContent : '';

  if (error) {
    dot.className = 'dot fail';
    statusEl.textContent = 'failed';
    statusEl.style.color = '#f48771';
    resultEl.className = 'tool-result error open';
    resultEl.textContent = error.substring(0, 200);
  } else {
    dot.className = 'dot done';
    statusEl.textContent = 'done';
    statusEl.style.color = '#50a14f';
    // Diff display for edit_file
    if (name === '编辑文件' && args.old_string && args.new_string) {
      var oldLines = args.old_string.split('\n');
      var newLines = args.new_string.split('\n');
      var diffHtml = '';
      for (var i = 0; i < Math.max(oldLines.length, newLines.length); i++) {
        if (i < oldLines.length && i < newLines.length && oldLines[i] !== newLines[i]) {
          diffHtml += '<div class="diff-del">- ' + esc(oldLines[i]) + '</div>';
          diffHtml += '<div class="diff-add">+ ' + esc(newLines[i]) + '</div>';
        } else if (i < oldLines.length && i >= newLines.length) {
          diffHtml += '<div class="diff-del">- ' + esc(oldLines[i]) + '</div>';
        } else if (i >= oldLines.length && i < newLines.length) {
          diffHtml += '<div class="diff-add">+ ' + esc(newLines[i]) + '</div>';
        } else {
          diffHtml += '<div>  ' + esc(oldLines[i]) + '</div>';
        }
      }
      resultEl.innerHTML = diffHtml;
      resultEl.className = 'tool-result open';
    } else if (resultText) {
      var preview = resultText.split('\n').filter(function(l){return l.trim();})[0] || '';
      if (preview.length > 120) preview = preview.substring(0, 120) + '...';
      resultEl.textContent = preview;
      div.setAttribute('data-result', resultText);
    }
    toggleEl.style.display = 'inline';
  }
}
function addStatus(text) {
  var div = document.createElement('div'); div.className = 'status'; div.textContent = text;
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}

// ── Sessions ───────────────────────────────────────────────────────────
async function loadSessions() {
  var result = await call('session.list');
  if (result && result.sessions) {
    sessions = result.sessions;
    renderSessions();
  }
}
function renderSessions() {
  sessionListEl.innerHTML = '';
  sessions.forEach(function(s) {
    var div = document.createElement('div'); div.className = 'session-item' + (s.id===currentSessionId?' active':'');
    var span = document.createElement('span'); span.textContent = s.title || s.id; span.style.overflow='hidden'; span.style.textOverflow='ellipsis';
    span.onclick = function() { loadSession(s.id); };
    var del = document.createElement('span'); del.className = 'del'; del.textContent = '✕';
    del.onclick = function(e) { e.stopPropagation(); deleteSession(s.id); };
    div.appendChild(span); div.appendChild(del);
    sessionListEl.appendChild(div);
  });
}

async function deleteSession(sid) {
  if (!confirm('删除此会话？TUI 中也会同步删除。')) return;
  await call('session.delete', { session_id: sid });
  sessions = sessions.filter(function(s) { return s.id !== sid; });
  if (currentSessionId === sid) { currentSessionId = null; clearChat(); welcomeEl.style.display = 'flex'; }
  if (sessions.length > 0 && !currentSessionId) { currentSessionId = sessions[0].id; call('session.activate', { session_id: sessions[0].id }); }
  renderSessions();
}
function updateSessionTitle(sid, text) {
  var s = sessions.find(function(x) { return x.id === sid; });
  if (s) { s.title = text || s.title; s.title = s.title.substring(0, 35); renderSessions(); }
}

async function loadSession(sid) {
  var result = await call('session.resume', { session_id: sid });
  if (!result || result.error) return;
  currentSessionId = sid;
  clearChat();
  // Render existing messages
  var msgs = result.messages || [];
  msgs.forEach(function(m) {
    if (m.role === 'user') addMsg('user', m.text, 'hist-' + Math.random());
    else if (m.role === 'assistant') addMsg('bobo', m.text, 'hist-' + Math.random());
    else if (m.role === 'tool') addTool(m.text ? m.text.substring(0, 40) : 'Tool');
    else if (m.role === 'system' && m.text && m.text.length < 200) addStatus(m.text);
  });
  chatEl.scrollTop = chatEl.scrollHeight;
  call('session.activate', { session_id: sid });
  renderSessions();
  // Update title with first user message
  var firstUserMsg = msgs.find(function(m) { return m.role === 'user'; });
  if (firstUserMsg) updateSessionTitle(sid, firstUserMsg.text.substring(0, 30));
}

async function newChat() {
  var result = await call('session.create', { title: 'New Chat' });
  if (result && result.session_id) {
    currentSessionId = result.session_id;
    clearChat();
    sessions.unshift({ id: result.session_id, title: 'New Chat' });
    renderSessions();
    call('session.activate', { session_id: result.session_id });
  }
}

// ── Connect & events ───────────────────────────────────────────────────
connect();

on('gateway.ready', async function() {
  debug('Connected ✓'); setConnected(true);
  // Check if API key is configured — show setup hint for new users
  var statusResult = await call('setup.status', {});
  if (statusResult && !statusResult.provider_configured) {
    setConnected(false);
    addMsg('bobo', '**欢迎使用 Bobo！**\n\n请先配置 API Key 以开始使用。点击左下角 ⚙ 图标打开设置，选择 Provider 并输入 API Key。\n\n推荐使用 DeepSeek：在 platform.deepseek.com/api-keys 获取免费 Key。', 'setup-msg');
    document.getElementById('settings-icon').click();
    return;
  }
  await loadSessions();
  if (sessions.length > 0) {
    currentSessionId = sessions[0].id;
    call('session.activate', { session_id: sessions[0].id });
    renderSessions();
  }
});

var streamingId = null;
var thinkText = '';
var toolsCalledThisRound = false;
var thinkBoxEl = null;

function freezeThinkBox() {
  if (!thinkBoxEl) return;
  if (thinkBoxEl._warnTimer) clearTimeout(thinkBoxEl._warnTimer);
  if (thinkBoxEl._killTimer) clearTimeout(thinkBoxEl._killTimer);
  thinkBoxEl.querySelector('.think-label').innerHTML = 'Thought';
  thinkBoxEl.style.opacity = '0.5';
}

function createThinkBox() {
  // Remove any old think box first
  if (thinkBoxEl) { freezeThinkBox(); thinkBoxEl = null; }
  var tb = document.createElement('div');
  tb.className = 'think-box show';
  tb.innerHTML = '<div class="think-label"><span>Thinking</span><span class="think-dot"></span><span class="think-dot"></span><span class="think-dot"></span><span class="think-stop" title="Stop" onclick="stopThinking()">✕</span></div><div class="think-text"></div>';
  chatEl.appendChild(tb);
  chatEl.scrollTop = chatEl.scrollHeight;
  tb._warnTimer = setTimeout(function() {
    if (tb.parentNode) tb.querySelector('.think-label').innerHTML += ' <span style="color:#f48771;font-weight:400;font-size:10px;">(slow response...)</span>';
  }, 10000);
  tb._killTimer = setTimeout(function() {
    if (tb.parentNode) {
      tb.querySelector('.think-text').textContent = 'API 无响应，请稍后重试或点击 ✕ 停止。';
      tb.querySelector('.think-label').innerHTML = '<span style="color:#f48771">⚠ Timeout</span>';
    }
  }, 30000);
  return tb;
}

function stopThinking() {
  if (thinkBoxEl) {
    if (thinkBoxEl._warnTimer) clearTimeout(thinkBoxEl._warnTimer);
    if (thinkBoxEl._killTimer) clearTimeout(thinkBoxEl._killTimer);
    if (currentSessionId) call('session.interrupt', { session_id: currentSessionId });
    thinkBoxEl.remove(); thinkBoxEl = null;
  }
  addStatus('Stopped');
}

on('message.start', function() {
  messaging = true; debug('Receiving...');
  thinkText = '';
  toolsCalledThisRound = false;
  streamingId = null;
  welcomeEl.style.display = 'none';
  thinkBoxEl = createThinkBox();  // fresh think box every round
});

on('message.delta', function(data) {
  var t = data ? data.text || '' : '';
  if (!toolsCalledThisRound) {
    thinkText += t;
    var txt = thinkBoxEl ? thinkBoxEl.querySelector('.think-text') : null;
    if (txt) { txt.textContent = thinkText; chatEl.scrollTop = chatEl.scrollHeight; }
  } else {
    if (!streamingId) streamingId = 'stream-' + Date.now();
    addMsg('bobo', t, streamingId, true);
  }
});
on('message.complete', function(data) {
  messaging = false; debug('Connected ✓');
  freezeThinkBox();
  thinkText = '';
  if (streamingId) { var old = document.getElementById(streamingId); if (old) old.remove(); streamingId = null; }
  var t = data ? data.final_text || '' : '';
  if (t && t.trim()) {
    addMsg('bobo', t, 'msg-' + Date.now());
  }
  loadSessions();
});
on('tool.start', function(data) {
  toolsCalledThisRound = true;
  var tid = data ? data.tool_id || 't'+Date.now() : 't'+Date.now();
  toolArgs[tid] = data ? data.arguments || {} : {};
  addTool(data ? data.name || data.tool_id || 'Tool' : 'Tool',
          data ? data.context || '' : '',
          tid);
});
on('tool.complete', function(data) {
  var tid = data ? data.tool_id || '' : '';
  if (tid) updateToolResult(tid, data ? data.result_text || '' : '', data ? data.error || '' : '');
});
on('status.update', function(data) {
  var t = data ? data.text || '' : ''; if (!t) return;
  if (t.indexOf('准备执行')===0 || t.indexOf('并行执行')===0) return;
  if (t === '工具执行完成' || t === '正在思考...') return;
  addStatus(t);
});
on('backend.exited', function() { setConnected(false); debug('Backend disconnected'); });
on('approval.request', function(data) {
  var cmd = data.command || data.description || 'unknown';
  if (confirm('Bobo 想要执行:\n\n' + cmd + '\n\n是否允许？')) {
    call('approval.respond', { session_id: currentSessionId, choice: 'once' });
  } else {
    call('approval.respond', { session_id: currentSessionId, choice: 'deny' });
    addStatus('已拒绝: ' + cmd.substring(0, 80));
  }
});
on('gateway.error', function(data) {
  addStatus('❌ ' + (data.message || 'Unknown error').substring(0, 200));
  debug('Error: ' + (data.message || '').substring(0, 60));
});

// ── Input ──────────────────────────────────────────────────────────────
document.getElementById('new-chat').addEventListener('click', newChat);
function handleSlash(cmd) {
  if (cmd === 'help') { addMsg('bobo', '**可用命令:**\n- /help — 显示帮助\n- /clear — 清除当前对话\n- /undo — 回退上一步\n- /tools — 列出工具\n- /settings — 查看配置\n\n或说 "切换到 OpenAI" 来换模型', 'help-'+Date.now()); return true; }
  if (cmd === 'clear') { clearChat(); welcomeEl.style.display = 'flex'; addStatus('对话已清除'); return true; }
  if (cmd === 'tools') {
    call('tools.list', {}).then(function(r) {
      var tools = r.tools || [];
      var names = tools.map(function(t){return t.name;}).join(', ');
      addMsg('bobo', '**可用工具 (' + tools.length + '):**\n' + names, 'tools-'+Date.now());
    });
    return true;
  }
  if (cmd === 'settings') {
    call('config.full', {}).then(function(r) {
      addMsg('bobo', '**当前配置:**\n```json\n' + JSON.stringify(r.config, null, 2) + '\n```', 'cfg-'+Date.now());
    });
    return true;
  }
  if (cmd === 'undo') { addStatus('请使用 Ctrl+Z 或在 TUI 中用 /undo'); return true; }
  return false;
}

sendEl.addEventListener('click', function() {
  var text = inputEl.value.trim(); if (!text || !connected) return;
  inputEl.value = '';
  if (text.startsWith('/')) {
    if (handleSlash(text.slice(1))) return;
  }
  addMsg('user', text, 'user-' + Date.now());
  sendPrompt(text);
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendEl.click(); }
});

// ── Keyboard shortcuts ──────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (!e.metaKey && !e.ctrlKey) return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); newChat(); }
  if (e.key === ',') { e.preventDefault(); document.getElementById('settings-icon').click(); }
});

// ── Settings ────────────────────────────────────────────────────────────
var modelPresets = {
  deepseek: ['deepseek-chat', 'deepseek-reasoner'],
  openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'],
  anthropic: ['claude-sonnet-4-20250514', 'claude-haiku-3-20240307'],
  openrouter: ['openai/gpt-4o', 'anthropic/claude-sonnet-4', 'google/gemini-2.0-flash'],
  google: ['gemini-2.0-flash', 'gemini-2.0-pro'],
  ollama: ['llama3', 'mistral', 'qwen2.5']
};
function updateModelOptions() {
  var p = document.getElementById('cfg-provider').value;
  var list = document.getElementById('cfg-model-list');
  var input = document.getElementById('cfg-model');
  list.innerHTML = '';
  (modelPresets[p] || []).forEach(function(m) {
    var opt = document.createElement('option'); opt.value = m; list.appendChild(opt);
  });
  if (modelPresets[p] && modelPresets[p].length) input.value = modelPresets[p][0];
}

document.getElementById('settings-icon').onclick = function() {
  call('setup.status', {}).then(function(r1) {
    document.getElementById('cfg-provider').value = (r1 && r1.provider) || 'deepseek';
    document.getElementById('cfg-apikey').placeholder = (r1 && r1.provider_configured) ? '已配置' : '输入API Key';
    updateModelOptions();
  });
  document.getElementById('settings-modal').classList.add('open');
};
document.getElementById('settings-close').onclick = function() {
  document.getElementById('settings-modal').classList.remove('open');
};
document.getElementById('settings-save').onclick = function() {
  var provider = document.getElementById('cfg-provider').value;
  var model = document.getElementById('cfg-model').value.trim();
  var key = document.getElementById('cfg-apikey').value.trim();
  var obsidian = document.getElementById('cfg-obsidian').value.trim();
  var status = document.getElementById('cfg-status');
  var done = [];

  if (key) {
    call('setup.submit', { provider: provider, api_key: key });
    done.push('API Key');
  }
  if (obsidian) {
    done.push('Obsidian vault 已记录');
    addStatus('请在终端运行: echo "OBSIDIAN_VAULT=' + obsidian + '" >> ~/.bobo/.env');
  }
  if (model) {
    done.push('Model: ' + model + ' 已记录');
    addStatus('请在终端运行: echo "API_MODEL_NAME=' + model + '" >> ~/.bobo/.env');
  }
  }
  status.textContent = done.length ? '✅ ' + done.join(', ') + ' 已保存' : '未做更改';
  setTimeout(function() { document.getElementById('settings-modal').classList.remove('open'); }, 1200);
};
</script>
<div id="settings-modal">
  <div id="settings-panel">
    <h2>⚙ Settings</h2>
    <label>Provider</label>
    <select id="cfg-provider" onchange="updateModelOptions()">
      <option value="deepseek">DeepSeek</option>
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="openrouter">OpenRouter</option>
      <option value="google">Google Gemini</option>
      <option value="ollama">Ollama (本地)</option>
    </select>
    <label>Model <span style="font-weight:400;color:var(--text-muted);font-size:11px;">（可编辑）</span></label>
    <input id="cfg-model" type="text" list="cfg-model-list" placeholder="e.g. deepseek-chat" />
    <datalist id="cfg-model-list"></datalist>
    <label>API Key</label>
    <input id="cfg-apikey" type="password" placeholder="输入 API Key" />
    <div style="display:flex;gap:12px;">
      <div style="flex:1;"><label>Max Steps</label><input id="cfg-maxsteps" type="number" value="12" min="3" max="30" /></div>
      <div style="flex:1;"><label>Timeout (s)</label><input id="cfg-timeout" type="number" value="60" min="30" max="300" /></div>
    </div>
    <label>Obsidian Vault</label>
    <input id="cfg-obsidian" type="text" placeholder="/path/to/vault" />
    <div id="cfg-status" style="font-size:11px;color:var(--text-muted);margin-top:4px;"></div>
    <div style="margin-top:16px;">
      <button class="btn-save" id="settings-save">保存</button>
      <button class="btn-close" id="settings-close" onclick="this.closest('#settings-modal').classList.remove('open')">取消</button>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" /><title>Bobo</title>
<style>
:root { --bg: #faf9f2; --bg2: #f2f1e8; --bg3: #eae8dc; --text: #2d2d2d; --text2: #777; --text-muted: #999; --border: #e0ded4; --hover: #e8e6da; --green: #4caf50; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; font-size:15px; line-height:1.6; overflow:hidden; height:100vh; }
#app { display:flex; height:100vh; }
/* Sidebar */
#sidebar { width:240px; min-width:240px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:margin-left 0.2s; }
#sidebar.closed { margin-left:-240px; }
#sidebar-header { padding:12px; }
#new-chat { width:100%; padding:10px; background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:14px; }
#new-chat:hover { background:var(--hover); }
#session-list { flex:1; overflow-y:auto; padding:4px 8px; }
.session-item { padding:10px 12px; border-radius:8px; cursor:pointer; color:var(--text2); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:space-between; }
.session-item:hover { background:var(--hover); }
.session-item.active { background:var(--bg3); color:var(--text); }
.session-item .del { visibility:hidden; cursor:pointer; color:#f44336; font-size:14px; margin-left:6px; flex-shrink:0; }
.session-item:hover .del { visibility:visible; }
.session-item .re { visibility:hidden; }
.session-item:hover .re { visibility:visible; }
#sidebar-footer { margin-top:auto; padding:12px; font-size:12px; color:var(--text2); border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
#sidebar-footer .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
#sidebar-footer .dot.green { background:var(--green); }
#sidebar-footer .dot.red { background:#f44336; }
/* Sidebar sections */
.section-hd { display:flex; align-items:center; gap:6px; padding:10px 14px; cursor:pointer; user-select:none; border-bottom:1px solid var(--border); }
.section-hd:hover { background:var(--hover); }
.section-arrow { font-size:10px; color:var(--text-muted); transition:transform 0.15s; }
.section-arrow.closed { transform:rotate(-90deg); }
.section-label { font-size:11px; font-weight:600; color:var(--text2); letter-spacing:0.5px; }
.section-bd { overflow:hidden; border-bottom:1px solid var(--border); }
.section-bd.closed, #body-session.closed, #body-plugin.closed { display:none; }
#body-session { flex:1; display:flex; flex-direction:column; min-height:0; }
#session-list { flex:1; overflow-y:auto; padding:4px 8px; min-height:0; }
/* Plugin items */
#plugin-list { padding:4px 0; }
.pitem { display:flex; align-items:center; gap:8px; padding:8px 14px; cursor:pointer; }
.pitem:hover { background:var(--hover); }
.pitem .pi-icon { font-size:14px; flex-shrink:0; width:20px; text-align:center; }
.pitem .pi-body { flex:1; }
.pitem .pi-name { font-size:12px; color:var(--text); }
.pitem .pi-desc { font-size:10px; color:var(--text-muted); margin-top:1px; }
.pitem .pi-arrow { font-size:11px; color:var(--text-muted); }
/* Right panel */
#right-panel { display:none; width:340px; min-width:340px; background:var(--bg); border-left:1px solid var(--border); flex-direction:column; }
#right-panel.open { display:flex; }
#right-tabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--border); overflow-x:auto; }
.rtab { padding:8px 14px; font-size:12px; color:var(--text2); cursor:pointer; border-right:1px solid var(--border); display:flex; align-items:center; gap:5px; white-space:nowrap; background:var(--bg2); }
.rtab.active { color:var(--text); background:var(--bg); border-bottom:2px solid #e8913a; }
.rtab .close { cursor:pointer; font-size:13px; color:var(--text-muted); margin-left:3px; }
.rtab .close:hover { color:#f44336; }
#right-content { flex:1; overflow-y:auto; padding:14px 16px; font-size:13px; color:var(--text2); line-height:1.7; }
/* Resize handle */
#resize-handle { width:4px; cursor:col-resize; background:transparent; flex-shrink:0; transition:background 0.15s; }
#resize-handle:hover, #resize-handle.active { background:var(--border); }
/* Note tree in right panel */
.nt-item { padding:4px 6px; cursor:pointer; border-radius:4px; display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text2); }
.nt-item:hover { background:var(--bg2); }
.nt-item.folder { color:var(--text); font-weight:600; }
.nt-item.file { color:var(--text2); }
.nt-item.file:hover { color:var(--text); }
.nt-children { padding-left:20px; }
/* Note preview in right panel */
.np h2 { font-size:16px; color:var(--text); margin:14px 0 6px; }
.np p { margin-bottom:6px; color:var(--text2); }
.np code { background:var(--bg2); padding:1px 5px; border-radius:3px; font-size:12px; color:#e8913a; }
/* Main */
#main { flex:1; display:flex; flex-direction:column; max-width:800px; margin:0 auto; width:100%; }
#welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
#welcome-logo { font-family:'SF Mono',Monaco,Menlo,monospace; font-size:13px; line-height:1.3; color:#e8913a; margin:0; text-align:center; letter-spacing:1px; }
.welcome-sub { color:var(--text-muted); font-size:13px; margin-top:4px; }
#chat { flex:1; overflow-y:auto; padding:24px 16px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.msg, .tool, .think-box.show, .status { animation:fadeIn 0.25s ease-out; }
.msg { padding:10px 18px; border-radius:12px; margin-bottom:20px; max-width:85%; }
.msg.user { background:var(--bg2); border:1px solid var(--border); margin-left:auto; }
.msg .who { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:4px; }
.msg .txt { white-space:pre-wrap; word-break:break-word; }
.msg .txt strong, .msg .txt b { color:#e8913a; }
.tool { font-size:13px; color:var(--text2); padding:6px 12px; margin:4px 0; cursor:pointer; border-radius:6px; display:flex; align-items:center; gap:8px; border:1px solid transparent; transition:background 0.15s, border-color 0.15s, opacity 0.2s; }
.tool:hover { background:rgba(0,0,0,0.02); border-color:var(--border); }
.tool .dot { color:var(--text-muted); font-size:10px; flex-shrink:0; animation:dotPulse 3s infinite; }
.tool .dot.done { animation:none; color:#50a14f; }
.tool .dot.fail { animation:none; color:#f48771; }
.tool .tool-name { flex-shrink:0; }
.tool .tool-context { color:var(--text-muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tool .tool-status { font-size:10px; color:var(--text-muted); margin-left:auto; flex-shrink:0; }
.tool .tool-toggle { color:var(--text-muted); font-size:10px; flex-shrink:0; }
.tool-result { font-size:11px; color:var(--text2); margin:2px 0 0 24px; padding:4px 10px; background:rgba(0,0,0,0.02); border-radius:4px; font-family:monospace; white-space:pre-wrap; word-break:break-all; max-height:120px; overflow-y:auto; display:none; }
.tool-result.open { display:block; }
.tool-result.error { color:#f48771; background:rgba(244,135,113,0.06); display:block; }
@keyframes dotPulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
/* Thinking */
.think-box { padding:10px 14px; margin:8px 0; border-radius:8px; font-size:13px; color:var(--text2); display:none; background:rgba(91,155,213,0.04); border:1px solid rgba(91,155,213,0.12); }
.think-box.show { display:block; }
.think-box .think-label { font-size:11px; color:#5b9bd5; margin-bottom:4px; font-weight:600; display:flex; align-items:center; gap:8px; }
.think-stop { margin-left:auto; cursor:pointer; font-size:12px; color:var(--text-muted); padding:2px 6px; border-radius:4px; font-weight:400; }
.think-stop:hover { background:rgba(244,135,113,0.1); color:#f48771; }
.think-dot { width:5px; height:5px; border-radius:50%; background:#5b9bd5; animation:thinkPulse 1.4s infinite; display:inline-block; }
.think-dot:nth-child(2) { animation-delay:0.2s; }
.think-dot:nth-child(3) { animation-delay:0.4s; }
.think-box .think-text { white-space:pre-wrap; word-break:break-word; line-height:1.5; }
@keyframes thinkPulse { 0%,60%,100% { opacity:0.2; transform:scale(1); } 30% { opacity:1; transform:scale(1.3); } }
.status { font-size:12px; color:var(--text2); text-align:center; padding:4px; }
/* Code blocks */
.code-block-wrapper { margin:8px 0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.code-header { display:flex; align-items:center; justify-content:space-between; background:var(--bg2); padding:6px 12px; border-bottom:1px solid var(--border); }
.code-lang { font-size:11px; color:var(--text2); text-transform:uppercase; }
.copy-btn { background:none; border:1px solid var(--border); border-radius:4px; color:var(--text2); cursor:pointer; font-size:11px; padding:2px 8px; font-family:inherit; }
.copy-btn:hover { background:var(--bg3); }
.copy-btn.copied { color:#50a14f; border-color:#50a14f; }
.msg .txt pre { background:#f3f2ea; border:none; padding:12px 16px; margin:0; overflow-x:auto; font-family:'SF Mono',Monaco,Menlo,monospace; font-size:13px; line-height:1.5; color:#333; }
.msg .txt code { font-family:'SF Mono',Monaco,Menlo,monospace; font-size:13px; background:rgba(0,0,0,0.05); padding:1px 4px; border-radius:3px; }
.msg .txt pre code { background:none; padding:0; font-size:13px; }
/* Diff */
.msg .txt .diff-add { color:#7ec87b; }
.msg .txt .diff-del { color:#f48771; }
.msg .txt .diff-file { color:#5b9bd5; font-weight:600; }
/* Tables */
.msg .txt table { border-collapse:collapse; margin:8px 0; font-size:13px; width:100%; }
.msg .txt th, .msg .txt td { border:1px solid var(--border); padding:6px 12px; text-align:left; }
.msg .txt th { background:var(--bg3); color:#5b9bd5; font-weight:600; }
.msg .txt tr:nth-child(even) { background:rgba(255,255,255,0.03); }
#input-box { padding:12px 16px 24px; position:relative; }
#input { width:100%; padding:14px 48px 14px 18px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font:inherit; resize:none; outline:none; }
#input:focus { border-color:#e8913a; box-shadow:0 0 0 2px rgba(232,145,58,0.12); }
#input::placeholder { color:var(--text2); }
#send { position:absolute; right:24px; bottom:32px; width:32px; height:32px; border-radius:8px; background:var(--text); color:var(--bg); border:none; cursor:pointer; font-size:16px; font-weight:600; }
#send:disabled { opacity:0.3; }
#send.loading { animation: sendPulse 1.2s ease-in-out infinite; }
@keyframes sendPulse { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }
#debug { text-align:center; font-size:11px; color:#666; margin-top:8px; font-family:monospace; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }
/* Settings modal */
#settings-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; }
#settings-modal.open { display:flex; }
#settings-panel { background:var(--bg2); border:1px solid var(--border); border-radius:12px; display:flex; width:580px; max-height:80vh; overflow:hidden; }
#settings-nav { width:130px; min-width:130px; border-right:1px solid var(--border); padding:16px 0; }
.settings-tab { padding:10px 16px; cursor:pointer; font-size:13px; color:var(--text2); border-left:3px solid transparent; }
.settings-tab:hover { background:var(--hover); }
.settings-tab.active { color:var(--text); background:var(--bg3); border-left-color:#e8913a; font-weight:600; }
#settings-content { flex:1; padding:20px 24px; overflow-y:auto; }
#settings-content h2 { font-size:18px; margin-bottom:16px; }
.settings-page label { display:block; font-size:12px; color:var(--text2); margin-top:12px; margin-bottom:4px; }
.settings-page input, .settings-page select { width:100%; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font:inherit; margin-bottom:4px; box-sizing:border-box; }
/* Preview panel */
#preview-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:99; }
#preview-overlay.open { display:block; }
#preview-panel { display:none; position:fixed; top:0; right:0; width:480px; height:100%; background:var(--bg2); border-left:1px solid var(--border); z-index:100; flex-direction:column; animation:slideRight 0.2s ease-out; }
#preview-panel.open { display:flex; }
@keyframes slideRight { from { transform:translateX(20px); opacity:0; } to { transform:translateX(0); opacity:1; } }
#preview-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
#preview-header span { font-size:14px; font-weight:600; }
#preview-close { background:none; border:none; cursor:pointer; font-size:16px; color:var(--text2); padding:4px 8px; border-radius:4px; }
#preview-close:hover { background:var(--hover); }
#preview-iframe { flex:1; border:none; background:#fff; }
.preview-btn { background:#5b9bd5; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:11px; padding:2px 8px; font-family:inherit; margin-right:4px; }
.preview-btn:hover { opacity:0.85; }
</style>
</head>

<script>
// ── Gateway ────────────────────────────────────────────────────────────
const handlers = new Map(); let reqId = 0; const pending = new Map();
let currentSessionId = null; let connected = false;
function connect() {
  if (!window.boboAPI) { debug('Browser mode'); return; }
  debug('Connecting...');
  window.boboAPI.onMessage(function(msg) {
    if (!msg || typeof msg !== 'object') return;
    if (msg.method === 'event' && msg.params && msg.params.type) {
      var h = handlers.get(msg.params.type);
      if (h) h(msg.params.payload || msg.params);
      return;
    }
    if (msg.id) { var r = pending.get(msg.id); if (r) { pending.delete(msg.id); r(msg.result || msg.error || {}); } }
  });
  window.boboAPI.onStatus(function(data) {
    if (data.status === 'exited') { var h = handlers.get('backend.exited'); if (h) h(data); }
  });
  if (window.boboAPI.getPending) window.boboAPI.getPending();
}
function on(e, h) { handlers.set(e, h); }
function call(m, p) {
  if (!window.boboAPI) return Promise.resolve({});
  return new Promise(function(resolve) {
    var id = 'req-' + (++reqId); pending.set(id, resolve);
    window.boboAPI.send({ jsonrpc:'2.0', id:id, method:m, params:p||{} });
    setTimeout(function() { pending.delete(id); resolve({}); }, 120000);
  });
}
function sendPrompt(text) {
  if (!currentSessionId || !window.boboAPI) { debug('Cannot send: no session or API'); return; }
  debug('Sent ✓');
  // Timeout: if backend doesn't respond within 15s, notify user
  if (sendTimeoutId) clearTimeout(sendTimeoutId);
  sendTimeoutId = setTimeout(function() {
    addStatus('⚠ 消息已发送但后端未响应，请检查连接状态');
    sendTimeoutId = null;
  }, 15000);
  window.boboAPI.send({ jsonrpc:'2.0', id:'prompt-'+(++reqId), method:'prompt.submit', params:{ session_id:currentSessionId, text:text } });
}

// ── UI refs ────────────────────────────────────────────────────────────
var chatEl = document.getElementById('chat');
var welcomeEl = document.getElementById('welcome');
var inputEl = document.getElementById('input');
var sendEl = document.getElementById('send');
var debugEl = document.getElementById('debug');
var sessionListEl = document.getElementById('session-list');
var statusDot = document.getElementById('status-dot');
var statusText = document.getElementById('status-text');
var messaging = false;
var sessions = [];
var sendTimeoutId = null;

function debug(msg) { debugEl.textContent = '[' + msg + ']'; }
function setConnected(c) {
  connected = c; inputEl.disabled = !c; sendEl.disabled = !c;
  inputEl.placeholder = c ? '输入消息 (⌘↵ 发送，↵ 换行)' : 'Connecting...';
  statusDot.className = 'dot ' + (c ? 'green' : 'red');
  statusText.textContent = c ? 'Connected' : 'Offline';
}
var _codeStore = {};
var _codeId = 0;
function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyCode(id) {
  var code = _codeStore[id];
  if (!code) return;
  navigator.clipboard.writeText(code).then(function() {
    var btn = document.getElementById('copy-' + id);
    if (btn) { btn.textContent = '✓ 已复制'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000); }
  });
}
function highlight(code, lang) {
  // 1) 转义 HTML 特殊字符
  var html = esc(code);
  // 2) 在纯文本上收集所有高亮区间（不含 HTML 标签干扰）
  var spans = [];  // {start, end, tag}
  function addSpan(re, tag) {
    var m;
    // Reset lastIndex
    re.lastIndex = 0;
    while ((m = re.exec(html)) !== null) {
      spans.push({ start: m.index, end: m.index + m[0].length, tag: tag });
    }
  }
  // 字符串 — 优先于注释/关键字，避免 "hi # comment" 里的 # 被误标
  addSpan(/''[^']*''|"""[^"]*"""/g, '<span style="color:#50a14f">');
  addSpan(/&quot;.*?&quot;|&#39;.*?&#39;|".*?"|'.*?'/g, '<span style="color:#50a14f">');
  // 注释
  addSpan(/(#.*$)/gm, '<span style="color:#a0a0a0;font-style:italic">');
  addSpan(/(\/\/.*$)/gm, '<span style="color:#a0a0a0;font-style:italic">');
  // 数字
  addSpan(/\b(\d+\.?\d*)\b/g, '<span style="color:#c18401">');
  // 关键字
  var kw = '\\b(def|class|import|from|return|if|else|elif|for|while|try|except|finally|with|as|in|not|and|or|True|False|None|pass|break|continue|yield|async|await|function|const|let|var|export|default|new|this|throw|catch|go|func|defer|struct|interface|map|chan|fn|let|mut|pub|impl|trait|enum|mod|use)\\b';
  addSpan(new RegExp(kw, 'g'), '<span style="color:#a626a4;font-weight:600">');
  // 装饰器
  addSpan(/(@\w+)/g, '<span style="color:#c18401">');
  // 3) 按 start 排序，后处理覆盖：短区间被长区间覆盖时丢弃
  spans.sort(function(a, b) { return a.start - b.start; });
  var merged = [];
  for (var i = 0; i < spans.length; i++) {
    var s = spans[i];
    // 被上一个覆盖？后面的 start 小于前一个的 end 就丢弃
    if (merged.length > 0 && s.start < merged[merged.length - 1].end) continue;
    merged.push(s);
  }
  // 4) 从右到左插入，确保位置不偏移
  var result = html;
  for (var i = merged.length - 1; i >= 0; i--) {
    var sp = merged[i];
    result = result.slice(0, sp.end) + '</span>' + result.slice(sp.end);
    result = result.slice(0, sp.start) + sp.tag + result.slice(sp.start);
  }
  return result;
}
function md(s) {
  var codeBlocks = [];
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var rawCode = code.trim();
    var cid = 'c' + (++_codeId);
    _codeStore[cid] = rawCode;
    codeBlocks.push(
      '<div class="code-block-wrapper">' +
      '<div class="code-header">' +
      '<span class="code-lang">' + esc(lang || '') + '</span>' +
      (lang === 'html' ? '<button class="preview-btn" data-cid="' + cid + '" onclick="openPreview(\'' + cid + '\')">预览</button>' : '') +
      '<button id="copy-' + cid + '" class="copy-btn" onclick="copyCode(\'' + cid + '\')">复制</button>' +
      '</div>' +
      '<pre><code>' + highlight(rawCode, lang) + '</code></pre>' +
      '</div>'
    );
    return '%%CODEBLOCK' + (codeBlocks.length-1) + '%%';
  });
  var tables = [];
  s = s.replace(/((?:\\|.+(?:\\r?\\n|$))+)/gm, function(block) {
    var lines = block.trim().split(/\r?\n/);
    if (lines.length < 2) return block;
    var sepLine = lines[1].replace(/\s/g, '');
    var hasDivider = /^\|?[-:]+\|?$/.test(sepLine);
    if (hasDivider) {
      // Standard markdown table with header/divider/data
      var h = '<table><thead><tr>' + lines[0].split('|').filter(function(c){return c.trim();}).map(function(c){return '<th>'+esc(c.trim())+'</th>';}).join('') + '</tr></thead><tbody>';
      for (var i=2; i<lines.length; i++) {
        h += '<tr>' + lines[i].split('|').filter(function(c){return c.trim();}).map(function(c){return '<td>'+esc(c.trim())+'</td>';}).join('') + '</tr>';
      }
      h += '</tbody></table>';
      tables.push(h);
      return '%%TABLE' + (tables.length-1) + '%%';
    }
    // Fallback: no divider row — detect if it looks like a table (all lines have ≥2 | cells)
    var cellCounts = lines.map(function(l) { return l.split('|').filter(function(c){return c.trim();}).length; });
    var avg = cellCounts.reduce(function(a,b){return a+b;}, 0) / cellCounts.length;
    if (avg >= 2 && cellCounts.every(function(c) { return Math.abs(c - avg) <= 1; })) {
      // First row = header, rest = data
      var h = '<table><thead><tr>' + lines[0].split('|').filter(function(c){return c.trim();}).map(function(c){return '<th>'+esc(c.trim())+'</th>';}).join('') + '</tr></thead><tbody>';
      for (var i=1; i<lines.length; i++) {
        if (lines[i].trim()) {
          h += '<tr>' + lines[i].split('|').filter(function(c){return c.trim();}).map(function(c){return '<td>'+esc(c.trim())+'</td>';}).join('') + '</tr>';
        }
      }
      h += '</tbody></table>';
      tables.push(h);
      return '%%TABLE' + (tables.length-1) + '%%';
    }
    return block;
  });
  s = esc(s);
  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3 style="font-size:16px;margin:12px 0 4px;">$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2 style="font-size:18px;margin:16px 0 4px;">$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1 style="font-size:20px;margin:20px 0 4px;">$1</h1>');
  // Lists
  s = s.replace(/^\- (.+)$/gm, '<li style="margin-left:16px;">$1</li>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li style="margin-left:16px;">$1</li>');
  // Quotes
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote style="border-left:2px solid #5b9bd5;padding-left:12px;color:var(--text2);margin:4px 0;">$1</blockquote>');
  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#5b9bd5;">$1</a>');
  // Inline code, bold
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Diff lines
  var lines = s.split('\n');
  for (var i = 0; i < lines.length; i++) {
    if (/^\+/.test(lines[i]) && !/^\+[-\s]/.test(lines[i])) lines[i] = '<span class="diff-add">' + lines[i] + '</span>';
    else if (/^\-/.test(lines[i]) && !/^\-[-\s]/.test(lines[i])) lines[i] = '<span class="diff-del">' + lines[i] + '</span>';
    else if (/^@@/.test(lines[i])) lines[i] = '<span class="diff-file">' + lines[i] + '</span>';
  }
  s = lines.join('\n');
  s = s.replace(/%%CODEBLOCK(\d+)%%/g, function(_, i) { return codeBlocks[+i]; });
  s = s.replace(/%%TABLE(\d+)%%/g, function(_, i) { return tables[+i]; });
  return s;
}

function updateToolResult(toolId, resultText, error, duration) {
  // Find the first still-running entry for this tool name
  var allEntries = chatEl.querySelectorAll('.tool[data-tool="' + toolId + '"]');
  var div = null;
  for (var i = 0; i < allEntries.length; i++) {
    var s = allEntries[i].querySelector('.tool-status');
    if (s && s.textContent === 'running') { div = allEntries[i]; break; }
  }
  if (!div) return;
  var dot = div.querySelector('.dot');
  var statusEl = div.querySelector('.tool-status');
  var toggleEl = div.querySelector('.tool-toggle');
  var resultEl = div.querySelector('.tool-result');

  if (error) {
    dot.className = 'dot fail';
    statusEl.textContent = 'failed';
    statusEl.style.color = '#f48771';
    resultEl.className = 'tool-result error open';
    resultEl.textContent = error.substring(0, 200);
  } else {
    dot.className = 'dot done';
    statusEl.textContent = duration ? 'done (' + duration.toFixed(1) + 's)' : 'done';
    statusEl.style.color = '#50a14f';
    if (resultText) {
      var preview = resultText.split('\\n').filter(function(l){return l.trim();})[0] || '';
      if (preview.length > 120) preview = preview.substring(0, 120) + '...';
      resultEl.textContent = preview;
      div.setAttribute('data-result', resultText);
    }
    toggleEl.style.display = 'inline';
    // Notify when a tool > 2s completes
    if (duration > 2 && Notification.permission !== 'denied') {
      if (Notification.permission === 'granted') {
        new Notification('Bobo', { body: friendlyMap[toolId] || toolId + ' 完成 (' + duration.toFixed(1) + 's)' });
      } else if (Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }
  }
}

(function() {
  var handle = document.getElementById('resize-handle');
  var panel = document.getElementById('right-panel');
  var mainEl = document.getElementById('main');
  if (!handle || !panel) return;
  var startX, startW;
  handle.addEventListener('mousedown', function(e) {
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!handle.classList.contains('active')) return;
    var w = startW - (e.clientX - startX);
    if (w < 200) w = 200;
    if (w > 600) w = 600;
    panel.style.width = w + 'px';
    panel.style.minWidth = w + 'px';
    mainEl.style.maxWidth = 'calc(100vw - 240px - ' + w + 'px)';
  });
  document.addEventListener('mouseup', function() {
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

async function loadSessions() {

function startRename(s, span) {
  var input = document.createElement('input');
  input.value = s.title || '';
  input.style.width = '100%'; input.style.border = 'none'; input.style.outline = 'none';
  input.style.background = 'transparent'; input.style.font = 'inherit'; input.style.color = 'inherit';
  span.textContent = '';
  span.appendChild(input);
  input.focus();
  input.select();
  function save() {
    var t = input.value.trim();
    if (t && t !== s.title) {
      s.title = t.substring(0, 35);
      call('session.rename', { session_id: s.id, title: t });
      renderSessions();
    } else {
      span.textContent = s.title || s.id;
    }
  }
  input.onblur = save;
  input.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { span.textContent = s.title || s.id; }
  };
}
function renderSessions(filter) {
  sessionListEl.innerHTML = '';
  var filtered = sessions;
  if (filter) {
    var q = filter.toLowerCase();
    filtered = sessions.filter(function(s) { return (s.title || '').toLowerCase().indexOf(q) !== -1; });
  }
  filtered.forEach(function(s) {
    var div = document.createElement('div'); div.className = 'session-item' + (s.id===currentSessionId?' active':'');
    var span = document.createElement('span'); span.textContent = s.title || s.id; span.style.overflow='hidden'; span.style.textOverflow='ellipsis';
    span.onclick = function() { loadSession(s.id); };
    var re = document.createElement('span'); re.textContent = '✎'; re.className = 're'; re.style.cssText = 'cursor:pointer;color:var(--text-muted);font-size:12px;margin-left:4px;flex-shrink:0;';
    re.onclick = function(e) { e.stopPropagation(); startRename(s, span); };
    var del = document.createElement('span'); del.className = 'del'; del.textContent = '✕';
    del.onclick = function(e) { e.stopPropagation(); deleteSession(s.id); };
    div.appendChild(span); div.appendChild(re); div.appendChild(del);
    sessionListEl.appendChild(div);
  });
}

  if (currentSessionId === sid) { currentSessionId = null; clearChat(); welcomeEl.style.display = 'flex'; }
  if (sessions.length > 0 && !currentSessionId) { currentSessionId = sessions[0].id; call('session.activate', { session_id: sessions[0].id }); }
  renderSessions();
}

}

async function loadSession(sid) {
  var result = await call('session.resume', { session_id: sid });
  if (!result || result.error) return;
  currentSessionId = sid;
  clearChat();
  // Render existing messages
  var msgs = result.messages || [];
  msgs.forEach(function(m) {
    if (m.role === 'user') addMsg('user', m.text, 'hist-' + Math.random());
    else if (m.role === 'assistant') addMsg('bobo', m.text, 'hist-' + Math.random());
    else if (m.role === 'tool') addTool(m.tool_name || m.text || 'Tool', '', m.tool_id || 'tool');
    else if (m.role === 'system' && m.text && m.text.length < 200) addStatus(m.text);
  });
  chatEl.scrollTop = chatEl.scrollHeight;
  call('session.activate', { session_id: sid });
  renderSessions();
  // Update title with first user message
  var firstUserMsg = msgs.find(function(m) { return m.role === 'user'; });
  if (firstUserMsg) updateSessionTitle(sid, firstUserMsg.text.substring(0, 30));
}

async function newChat() {
  var result = await call('session.create', { title: 'New Chat' });
  if (result && result.session_id) {
    currentSessionId = result.session_id;
    clearChat();
    sessions.unshift({ id: result.session_id, title: 'New Chat' });
    renderSessions();
    call('session.activate', { session_id: result.session_id });
  }
}

// ── Connect & events ───────────────────────────────────────────────────
connect();

on('gateway.ready', async function() {
  debug('已连接，恢复会话...'); setConnected(true);
  await loadSessions();
  if (sessions.length > 0) {
    currentSessionId = sessions[0].id;
    await loadSession(sessions[0].id);
    renderSessions();
    renderPluginList();
    // Default: Plugin section closed
    document.getElementById('body-plugin').classList.add('closed');
    document.getElementById('arr-plugin').classList.add('closed');
  } else {
    // First-time user: auto-create a session
    await newChat();
  }
  debug('Ready'); inputEl.focus();
});

var streamingId = null;
var thinkText = '';
var toolsCalledThisRound = false;
var thinkBoxEl = null;

function createThinkBox() {
  var tb = document.createElement('div');
  tb.className = 'think-box show';
  tb.innerHTML = '<div class="think-label"><span>Thinking</span><span class="think-dot"></span><span class="think-dot"></span><span class="think-dot"></span><span class="think-stop" title="Stop" onclick="stopThinking()">✕</span></div><div class="think-text"></div>';
  chatEl.appendChild(tb);
  chatEl.scrollTop = chatEl.scrollHeight;
  // 10s: show warning
  tb._warnTimer = setTimeout(function() {
    if (tb.parentNode) {
      tb.querySelector('.think-label').innerHTML += ' <span style="color:#f48771;font-weight:400;font-size:10px;">(slow response...)</span>';
    }
  }, 10000);
  // 30s: auto-timeout — API likely hung
  tb._killTimer = setTimeout(function() {
    if (tb.parentNode) {
      tb.querySelector('.think-text').textContent = 'API 无响应，请稍后重试或点击 ✕ 停止。';
      tb.querySelector('.think-label').innerHTML = '<span style="color:#f48771">⚠ Timeout</span>';
    }
  }, 30000);
  return tb;
}

function stopThinking() {
  if (thinkBoxEl) {
    if (thinkBoxEl._warnTimer) clearTimeout(thinkBoxEl._warnTimer);
    if (thinkBoxEl._killTimer) clearTimeout(thinkBoxEl._killTimer);
    if (currentSessionId) call('session.interrupt', { session_id: currentSessionId });
    thinkBoxEl.remove(); thinkBoxEl = null;
  }
  addStatus('Stopped');
}

on('message.start', function() {
  if (sendTimeoutId) { clearTimeout(sendTimeoutId); sendTimeoutId = null; }
  messaging = true; sendEl.classList.add('loading'); debug('Receiving...');
  thinkText = '';
  toolsCalledThisRound = false;
  streamingId = null;
  welcomeEl.style.display = 'none';
  thinkBoxEl = createThinkBox();
});

on('message.delta', function(data) {
  var t = data ? data.text || '' : '';
  if (t && thinkBoxEl) {
    thinkText += t;
    var txt = thinkBoxEl.querySelector('.think-text');
    if (txt) { txt.textContent = thinkText; chatEl.scrollTop = chatEl.scrollHeight; }
  }
});
on('message.complete', function(data) {
  messaging = false; sendEl.classList.remove('loading'); debug('Connected ✓');
  var toolsWereCalled = toolIdCounter > 0;
  thinkText = '';
  if (streamingId) { var old = document.getElementById(streamingId); if (old) old.remove(); streamingId = null; }
  toolIdCounter = 0;
  var t = data ? data.final_text || '' : '';
  if (t && t.trim()) {
    if (thinkBoxEl) { thinkBoxEl.remove(); thinkBoxEl = null; }
    addMsg('bobo', t, 'msg-' + Date.now());
  } else if (toolsWereCalled && thinkBoxEl) {
    // All tool calls done with no final text — clean up think box
    if (thinkBoxEl._warnTimer) clearTimeout(thinkBoxEl._warnTimer);
    if (thinkBoxEl._killTimer) clearTimeout(thinkBoxEl._killTimer);
    thinkBoxEl.remove(); thinkBoxEl = null;
  } else if (thinkBoxEl) {
    if (thinkBoxEl._warnTimer) clearTimeout(thinkBoxEl._warnTimer);
    if (thinkBoxEl._killTimer) clearTimeout(thinkBoxEl._killTimer);
    thinkBoxEl.style.opacity = '0.5';
  }
  loadSessions();
});
on('tool.start', function(data) {
  toolsCalledThisRound = true;
  addTool(data ? data.name || data.tool_id || 'Tool' : 'Tool',
          data ? data.context || '' : '',
          data ? data.tool_id || 't'+Date.now() : 't'+Date.now());
});
on('tool.complete', function(data) {
  var tid = data ? data.tool_id || '' : '';
  if (tid) updateToolResult(tid, data ? data.result_text || '' : '', data ? data.error || '' : '', data ? data.duration || 0 : 0);
});
on('status.update', function(data) {
  var t = data ? data.text || '' : ''; if (!t) return;
  if (t.indexOf('准备执行')===0 || t.indexOf('并行执行')===0) return;
  if (t === '工具执行完成' || t === '正在思考...') return;
  addStatus(t);
});
on('backend.exited', function() { setConnected(false); debug('Backend disconnected'); });
on('approval.request', function(data) {
  var cmd = data.command || data.description || 'unknown';
  if (confirm('Bobo 想要执行:\n\n' + cmd + '\n\n是否允许？')) {
    call('approval.respond', { session_id: currentSessionId, choice: 'once' });
  } else {
    call('approval.respond', { session_id: currentSessionId, choice: 'deny' });
    addStatus('已拒绝: ' + cmd.substring(0, 80));
  }
});
on('gateway.error', function(data) {
  addStatus('❌ ' + (data.message || 'Unknown error').substring(0, 200));
  debug('Error: ' + (data.message || '').substring(0, 60));
});

// ── Fallback: if gateway.ready hasn't fired within 5s, poll backend ──
var readyFallbackTimer = setTimeout(async function() {
  if (connected) return;
  debug('Waiting for backend...');
  for (var attempt = 0; attempt < 5; attempt++) {
    if (connected) return;
    var r = await call('setup.status', {});
    if (r && typeof r === 'object' && !r.error) {
      // Backend is alive despite missing gateway.ready
      setConnected(true);
      await loadSessions();
      if (sessions.length > 0) {
        currentSessionId = sessions[0].id;
        call('session.activate', { session_id: sessions[0].id });
        renderSessions();
      } else {
        await newChat();
      }
      debug('Connected ✓');
      inputEl.focus();
      return;
    }
    await new Promise(function(r2) { setTimeout(r2, 2000); });
  }
  if (!connected) debug('Backend unavailable');
}, 5000);

// ── Input ──────────────────────────────────────────────────────────────
document.getElementById('new-chat').addEventListener('click', newChat);
function handleSlash(cmd) {
  if (cmd === 'help') { addMsg('bobo', '**可用命令:**\n- /help — 显示帮助\n- /clear — 清除当前对话\n- /undo — 回退上一步\n- /tools — 列出工具\n- /settings — 查看配置\n\n或说 "切换到 OpenAI" 来换模型', 'help-'+Date.now()); return true; }
  if (cmd === 'clear') { clearChat(); welcomeEl.style.display = 'flex'; addStatus('对话已清除'); return true; }
  if (cmd === 'tools') {
    call('tools.list', {}).then(function(r) {
      var tools = r.tools || [];
      var names = tools.map(function(t){return t.name;}).join(', ');
      addMsg('bobo', '**可用工具 (' + tools.length + '):**\n' + names, 'tools-'+Date.now());
    });
    return true;
  }
  if (cmd === 'settings') {
    call('config.full', {}).then(function(r) {
      addMsg('bobo', '**当前配置:**\n```json\n' + JSON.stringify(r.config, null, 2) + '\n```', 'cfg-'+Date.now());
    });
    return true;
  }
  if (cmd === 'undo') { addStatus('请使用 Ctrl+Z 或在 TUI 中用 /undo'); return true; }
  return false;
}

sendEl.addEventListener('click', function() {
  var text = inputEl.value.trim(); if (!text || !connected || messaging) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  if (text.startsWith('/')) {
    if (handleSlash(text.slice(1))) return;
  }
  addMsg('user', text, 'user-' + Date.now());
  sendPrompt(text);
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendEl.click(); }
});
// Auto-height textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// ── Settings ────────────────────────────────────────────────────────────
// Tab switching
document.querySelectorAll('.settings-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.settings-tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    document.querySelectorAll('.settings-page').forEach(function(p) { p.style.display = 'none'; });
    var page = document.getElementById('page-' + this.getAttribute('data-tab'));
    if (page) page.style.display = 'block';
  });
});

// Open settings
document.getElementById('settings-icon').onclick = function() {
  call('setup.status', {}).then(function(r1) {
    document.getElementById('cfg-provider').value = (r1 && r1.provider) || 'deepseek';
    document.getElementById('cfg-apikey').placeholder = (r1 && r1.provider_configured) ? '已配置' : '输入API Key';
    // Trigger provider change to populate models
    document.getElementById('cfg-provider').dispatchEvent(new Event('change'));
  });
  document.getElementById('settings-modal').classList.add('open');
};
// Provider → model linkage
document.getElementById('cfg-provider').addEventListener('change', function() {
  var models = {
    'deepseek': ['deepseek-chat', 'deepseek-reasoner'],
    'openai': ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo'],
    'anthropic': ['claude-sonnet-4-20250514', 'claude-haiku-3-20240307'],
    'openrouter': ['openai/gpt-4o', 'anthropic/claude-sonnet-4', 'google/gemini-2.0-flash'],
    'google': ['gemini-2.0-flash', 'gemini-2.0-pro'],
    'ollama': ['llama3', 'mistral', 'qwen2.5'],
  };
  var sel = document.getElementById('cfg-model');
  var prev = sel.value;
  sel.innerHTML = '';
  (models[this.value] || ['deepseek-chat']).forEach(function(m) {
    var opt = document.createElement('option'); opt.value = m; opt.textContent = m;
    if (m === prev) opt.selected = true;
    sel.appendChild(opt);
  });
});
document.getElementById('settings-close').onclick = function() {
  document.getElementById('settings-modal').classList.remove('open');
};
document.getElementById('settings-save').onclick = function() {
  var key = document.getElementById('cfg-apikey').value.trim();
  var model = document.getElementById('cfg-model').value;
  if (key) {
    call('setup.submit', { provider: document.getElementById('cfg-provider').value, api_key: key }).then(function(res) {
      if (res && res.ok === false) {
        addStatus('设置失败: ' + (res.error || '未知错误'));
      } else {
        addStatus('Saved');
        if (model) call('config.set', { model: model });
      }
    });
  } else {
    addStatus('请输入 API Key');
  }
  document.getElementById('settings-modal').classList.remove('open');
};
document.getElementById('settings-clear').onclick = function() {
  if (!confirm('确定要删除所有会话吗？此操作不可撤销。')) return;
  sessions.forEach(function(s) {
    call('session.delete', { session_id: s.id });
  });
  sessions = [];
  currentSessionId = null;
  clearChat();
  renderSessions();
  addStatus('所有会话已删除');
  document.getElementById('settings-modal').classList.remove('open');
};

// ── Session search ──────────────────────────────────────────────────────
document.getElementById('session-search').addEventListener('input', function() {
  renderSessions(this.value);
});

// ── Keyboard shortcuts ──────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  var mod = e.metaKey || e.ctrlKey;
  if (e.key === 'n' && mod) { e.preventDefault(); newChat(); }
  if (e.key === ',' && mod) { e.preventDefault(); document.getElementById('settings-icon').click(); }
  if (e.key === 'Escape') { stopThinking(); }
});

// ── Auto-hide sidebar on narrow window ──────────────────────────────────
var sidebarEl = document.getElementById('sidebar');
var sidebarOpen = true;
function checkSidebar() {
  if (window.innerWidth < 640 && sidebarOpen) {
    sidebarEl.classList.add('closed'); sidebarOpen = false;
  } else if (window.innerWidth >= 640 && !sidebarOpen) {
    sidebarEl.classList.remove('closed'); sidebarOpen = true;
  }
}
window.addEventListener('resize', checkSidebar);
checkSidebar();

// ── HTML Preview ────────────────────────────────────────────────────
function openPreview(cid) {
  var code = _codeStore[cid];
  if (!code) return;
  document.getElementById('preview-overlay').classList.add('open');
  document.getElementById('preview-panel').classList.add('open');
  document.getElementById('preview-iframe').srcdoc = code;
}
document.getElementById('preview-close').onclick = function() {
  document.getElementById('preview-overlay').classList.remove('open');
  document.getElementById('preview-panel').classList.remove('open');
  var ifr = document.getElementById('preview-iframe');
  ifr.srcdoc = '';
};
document.getElementById('preview-overlay').onclick = function() {
  document.getElementById('preview-close').click();
};

// ── Session search ──────────────────────────────────────────────────────
</script>
